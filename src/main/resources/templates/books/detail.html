<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Book Detail</title>
</head>
<body>
<div th:replace="~{fragments/header :: layout(~{::#book-detail-content})}">
    <div id="book-detail-content">
        <h3 th:text="${book.title}"></h3>
        <hr>
        <dl class="row">
            <dt class="col-sm-3">ISBN</dt>
            <dd class="col-sm-9" th:text="${book.isbn}"></dd>
            <dt class="col-sm-3">Author</dt>
            <dd class="col-sm-9" th:text="${book.author}"></dd>
            <dt class="col-sm-3">Publisher</dt>
            <dd class="col-sm-9" th:text="${book.publisher ?: 'N/A'}"></dd>
            <dt class="col-sm-3">Edition</dt>
            <dd class="col-sm-9" th:text="${book.edition ?: 'N/A'}"></dd>
            <dt class="col-sm-3">Category</dt>
            <dd class="col-sm-9" th:text="${book.category}"></dd>
            <dt class="col-sm-3">Available</dt>
            <dd class="col-sm-9" th:text="${book.availableCopies + ' / ' + book.totalCopies}"></dd>
            <dt class="col-sm-3">Description</dt>
            <dd class="col-sm-9" th:text="${book.description ?: 'No description'}"></dd>
        </dl>
        <a th:href="@{/api/books}" class="btn btn-secondary mt-3">Back to List</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
