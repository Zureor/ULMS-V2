<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Librarian Dashboard</title>
</head>
<body>
    <div th:replace="~{fragments/header :: layout(~{::#dashboard-content})}">
        <div id="dashboard-content">
            <h2 class="fw-bold mb-4">Librarian Overview</h2>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="stat-card p-4 text-center">
                        <i class="fas fa-book fa-2x mb-3 text-success"></i>
                        <h3 class="fw-bold" th:text="${totalBooks}">0</h3>
                        <p class="text-secondary mb-0">Total Books</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card p-4 text-center">
                        <i class="fas fa-clock fa-2x mb-3 text-warning"></i>
                        <h3 class="fw-bold" th:text="${pendingReservations}">0</h3>
                        <p class="text-secondary mb-0">Pending Requests</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card p-4 text-center">
                        <i class="fas fa-check-circle fa-2x mb-3 text-info"></i>
                        <h3 class="fw-bold" th:text="${activeIssues}">0</h3>
                        <p class="text-secondary mb-0">Active Issues</p>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-12">
                    <p class="lead">Welcome, <span sec:authentication="name">Librarian</span>! You can manage books, reservations, and fines. Use the sidebar to navigate.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
