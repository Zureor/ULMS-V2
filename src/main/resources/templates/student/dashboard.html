<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Student Dashboard</title>
</head>
<body>
    <div th:replace="~{fragments/header :: layout(~{::#dashboard-content})}">
        <div id="dashboard-content">
            <h2 class="fw-bold mb-4">Student Overview</h2>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="stat-card p-4 text-center">
                        <i class="fas fa-hourglass-start fa-2x mb-3 text-warning"></i>
                        <h3 class="fw-bold" th:text="${pendingCount}">0</h3>
                        <p class="text-secondary mb-0">Pending Requests</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card p-4 text-center">
                        <i class="fas fa-book-reader fa-2x mb-3 text-info"></i>
                        <h3 class="fw-bold" th:text="${issuedCount}">0</h3>
                        <p class="text-secondary mb-0">Books with Me</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card p-4 text-center">
                        <i class="fas fa-hand-holding-usd fa-2x mb-3 text-danger"></i>
                        <h3 class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(unpaidFines, 1, 2)}">$0.00</h3>
                        <p class="text-secondary mb-0">Unpaid Fines</p>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <p class="lead">Welcome, <span sec:authentication="name">Student</span>! Browse books, manage reservations, and view fines. Use the sidebar to navigate.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
