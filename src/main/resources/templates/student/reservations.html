<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - My Reservations</title>
</head>
<body>
<div th:replace="~{fragments/header :: layout(~{::#student-reservations-content})}">
    <div id="student-reservations-content">
        <h2>My Reservations</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th><th>Book</th><th>Author</th><th>Status</th>
                <th>Issue Date</th><th>Due Date</th><th>Return Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.book.title}"></td>
                <td th:text="${r.book.author}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${r.status.name() == 'APPROVED' ? 'bg-success' : 
                                         (r.status.name() == 'PENDING' ? 'bg-warning text-dark' : 
                                         (r.status.name() == 'REJECTED' ? 'bg-danger' : 
                                         (r.status.name() == 'ISSUED' ? 'bg-info' : 
                                         (r.status.name() == 'RETURNED' ? 'bg-secondary' : ''))))}"
                          th:text="${r.status}"></span>
                </td>
                <td th:text="${r.issueDate}"></td>
                <td th:text="${r.dueDate}"></td>
                <td th:text="${r.returnDate}"></td>
                <td th:if="${r.status.name() == 'ISSUED'}">
                    <form th:action="@{/api/reservations/{id}/return(id=${r.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-primary">Return</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
