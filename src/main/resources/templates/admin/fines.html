<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Manage Fines</title>
</head>
<body>
<div th:replace="~{fragments/header :: layout(~{::#fines-content})}">
    <div id="fines-content">
        <h2>Manage Fines</h2>
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th><th>Student</th><th>Reservation</th><th>Amount</th>
                <th>Reason</th><th>Status</th><th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="fine : ${fines}">
                <td th:text="${fine.id}"></td>
                <td th:text="${fine.studentName}"></td>
                <td th:text="${fine.bookTitle}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(fine.amount, 1, 2)}"></td>
                <td th:text="${fine.reason}"></td>
                <td>
                    <span class="badge" 
                          th:classappend="${fine.status == 'PAID' ? 'bg-success' : (fine.status == 'UNPAID' ? 'bg-danger' : 'bg-secondary')}"
                          th:text="${fine.status}"></span>
                </td>
                <td>
                    <div th:if="${fine.status == 'UNPAID'}" class="btn-group btn-group-sm">
                        <form th:action="@{/api/fines/{id}/pay(id=${fine.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-success btn-sm">Mark Paid</button>
                        </form>
                        <form th:action="@{/api/fines/{id}/waive(id=${fine.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Waive this fine?')">
                            <button type="submit" class="btn btn-secondary btn-sm ms-1">Waive</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
