<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Manage Users</title>
</head>
<body>
<div th:replace="~{fragments/header :: layout(~{::#users-content})}">
    <div id="users-content">
        <h2>Manage Users</h2>
        <a th:href="@{/api/users/new}" class="btn btn-primary mb-3">Add User</a>
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th><th>Username</th><th>Full Name</th><th>Email</th>
                <th>Role</th><th>Student ID</th><th>Active</th><th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.fullName}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.role}"></td>
                <td th:text="${u.studentId ?: 'N/A'}"></td>
                <td th:text="${u.active}"></td>
                <td>
                    <a th:href="@{/api/users/{id}(id=${u.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <form th:action="@{/api/users/{id}/delete(id=${u.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Deactivate this user?')">
                        <button type="submit" class="btn btn-sm btn-danger">Deactivate</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <!-- Pagination -->
        <nav th:if="${users.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${users.number == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/api/users(page=0)}">First</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                    th:classappend="${i == users.number} ? 'active'">
                    <a class="page-link" th:href="@{/api/users(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${users.number >= users.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/api/users(page=${users.totalPages - 1})}">Last</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
