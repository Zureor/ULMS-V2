<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Add/Edit User</title>
</head>
<body>
    <div th:replace="~{fragments/header :: layout(~{::#user-form-content})}">
        <div id="user-form-content">
            <h2 class="fw-bold mb-4" th:text="${editMode} ? 'Edit User' : 'Add New User'"></h2>
            
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="${editMode} ? @{/api/users/{id}(id=${user.id})} : @{/api/users}" 
                  method="post" th:object="${registerRequest}" class="row g-3" style="max-width:700px">
                
                <div th:if="${#fields.hasErrors('*')}" class="col-12 alert alert-danger">
                    <ul>
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                    </ul>
                </div>
                
                <div class="col-md-6">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" th:readonly="${editMode}" required>
                </div>
                <div class="col-md-6">
                    <label for="password" class="form-label">Password <span th:if="${editMode}" class="text-muted">(Leave empty to keep current)</span></label>
                    <input type="password" th:field="*{password}" class="form-control" th:required="${!editMode}">
                </div>
                <div class="col-md-12">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" required>
                </div>
                <div class="col-md-12">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="role" class="form-label">Role</label>
                    <select th:field="*{role}" class="form-select">
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="studentId" class="form-label">Student ID (Optional)</label>
                    <input type="text" th:field="*{studentId}" class="form-control">
                </div>
                <div class="col-md-12">
                    <label for="department" class="form-label">Department</label>
                    <input type="text" th:field="*{department}" class="form-control">
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary" th:text="${editMode} ? 'Update User' : 'Create User'"></button>
                    <a th:href="@{/api/users}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
