<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Books</title>
</head>
<body>
    <div th:replace="~{fragments/header :: layout(~{::#books-content})}">
        <div id="books-content">
            <h2 class="fw-bold mb-4">Manage Books</h2>
            <a th:href="@{/api/books/new}" class="btn btn-success mb-3">
                <i class="fas fa-plus me-1"></i>Add New Book
            </a>
            <form th:action="@{/api/books}" method="get" class="row g-3 mb-4">
                <div class="col-auto">
                    <input type="text" name="query" th:value="${query}" class="form-control" placeholder="Search...">
                </div>
                <div class="col-auto">
                    <select name="category" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}" th:value="${cat}"
                                th:text="${cat}" th:selected="${cat == category}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ISBN</th><th>Title</th><th>Author</th><th>Category</th>
                        <th>Available</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.isbn}"></td>
                        <td th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td th:text="${book.category}"></td>
                        <td th:text="${book.availableCopies + '/' + book.totalCopies}"></td>
                        <td>
                            <a th:href="@{/api/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:action="@{/api/books/delete/{id}(id=${book.id})}" method="post" style="display:inline"
                                  onsubmit="return confirm('Delete this book?')">
                                <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
