<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Reservations</title>
</head>
<body>
<div th:replace="~{fragments/header :: layout(~{::#reservations-content})}">
    <div id="reservations-content">
        <h2>Manage Reservations</h2>
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th><th>Student</th><th>Book</th><th>Status</th>
                <th>Issue Date</th><th>Due Date</th><th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.user.fullName}"></td>
                <td th:text="${r.book.title}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${r.status.name() == 'PENDING' ? 'bg-warning text-dark' : 
                                         (r.status.name() == 'APPROVED' || r.status.name() == 'ISSUED' ? 'bg-success' : 
                                         (r.status.name() == 'REJECTED' ? 'bg-danger' : 'bg-secondary'))}"
                          th:text="${r.status}"></span>
                </td>
                <td th:text="${r.issueDate}"></td>
                <td th:text="${r.dueDate}"></td>
                <td>
                    <div th:if="${r.status.name() == 'PENDING'}" class="btn-group btn-group-sm">
                        <form th:action="@{/api/reservations/{id}/approve(id=${r.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-success">Approve</button>
                        </form>
                        <form th:action="@{/api/reservations/{id}/reject(id=${r.id})}" method="post" style="display:inline">
                            <input type="text" name="note" placeholder="Reason" required
                                   style="width:120px" class="form-control form-control-sm d-inline">
                            <button type="submit" class="btn btn-danger">Reject</button>
                        </form>
                    </div>
                    <div th:if="${r.status.name() == 'ISSUED'}" class="btn-group btn-group-sm">
                        <form th:action="@{/api/reservations/{id}/return(id=${r.id})}" method="post">
                            <button type="submit" class="btn btn-info">Mark Returned</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
