<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Add/Edit Book</title>
</head>
<body>
<div th:replace="~{fragments/header :: layout(~{::#book-form-content})}">
    <div id="book-form-content">
        <h2 th:text="${editMode} ? 'Edit Book' : 'Add New Book'"></h2>
        <form th:action="${editMode} ? @{/api/books/update/{id}(id=${book.id})} : @{/api/books}"
              method="post" th:object="${bookRequest}" class="row g-3" style="max-width:700px">
            <div class="col-md-6">
                <label>ISBN</label>
                <input type="text" th:field="*{isbn}" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Title *</label>
                <input type="text" th:field="*{title}" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Author *</label>
                <input type="text" th:field="*{author}" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Publisher</label>
                <input type="text" th:field="*{publisher}" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Edition</label>
                <input type="text" th:field="*{edition}" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Total Copies</label>
                <input type="number" th:field="*{totalCopies}" class="form-control" value="1" min="1">
            </div>
            <div class="col-md-4">
                <label>Category *</label>
                <select th:field="*{category}" class="form-select" required>
                    <option value="Programming">Programming</option>
                    <option value="Literature">Literature</option>
                    <option value="Science">Science</option>
                    <option value="History">History</option>
                    <option value="Art">Art</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div class="col-12">
                <label>Description</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12">
                <label>Cover Image URL</label>
                <input type="url" th:field="*{coverImageUrl}" class="form-control">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary me-2">
                    <i class="fas fa-save me-1"></i><span th:text="${editMode} ? 'Update' : 'Create'"></span>
                </button>
                <a href="/api/books" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
