<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}">
    <title>ULMS - Login</title>
</head>
<body>
<div class="auth-container">
    <div class="ui-card p-4 shadow-sm" style="width: 400px">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-book-open fa-3x text-primary" style="color: var(--accent) !important;"></i>
            </div>
            <h4 class="fw-bold">ULMS Login</h4>
            <p class="text-muted small">Admin-managed accounts only</p>
        </div>
        
        <div class="card-body">
            <div th:if="${param.logout}" class="alert alert-success border-0 rounded-4">You have been logged out.</div>
            <div th:if="${param.error}" class="alert alert-danger border-0 rounded-4">Invalid username or password.</div>
            
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-medium">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small fw-medium">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
